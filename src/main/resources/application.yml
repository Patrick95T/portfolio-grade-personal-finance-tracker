spring:
  application:
    name: portfolio-grade-personal-finance-tracker
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/personal_finance}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD:finance_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
