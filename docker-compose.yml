services:
  postgres:
    image: postgres:16
    container_name: personal-finance-forecasting-postgres
    environment:
      POSTGRES_DB: personal_finance
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d personal_finance"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - personal-finance-postgres-data:/var/lib/postgresql/data

volumes:
  personal-finance-postgres-data:
